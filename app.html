<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Ledger — VaultFinance</title>
<link rel="stylesheet" href="./CSS/style.css">
<style>
  .vf-app-wrap {
    width: 100%;
    max-width: 920px;
  }

  .vf-app-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .vf-app-head h1 { font-size: 24px; }
  .vf-app-head p { color: var(--text-dim); font-size: 13.5px; margin: 4px 0 0; }

  /* Balance readout */
  .vf-balance-panel {
    padding: 32px;
    text-align: center;
    margin-bottom: 24px;
  }

  .vf-balance-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .vf-balance-value {
    font-family: var(--font-mono);
    font-size: 48px;
    font-weight: 700;
    color: var(--emerald);
    text-shadow: 0 0 28px var(--emerald-glow);
    transition: color 0.3s ease;
  }

  .vf-balance-value.is-negative {
    color: var(--rose);
    text-shadow: 0 0 28px var(--rose-glow);
  }

  .vf-balance-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 18px;
    font-size: 13px;
  }

  .vf-balance-stats span { color: var(--text-dim); }
  .vf-balance-stats strong { font-family: var(--font-mono); display: block; font-size: 16px; margin-top: 2px; }
  .vf-stat-in strong { color: var(--emerald); }
  .vf-stat-out strong { color: var(--rose); }

  /* Two column layout: form + chart */
  .vf-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .vf-panel-pad { padding: 26px; }

  .vf-panel-pad h3 {
    font-size: 15px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .vf-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .vf-entry-actions { display: flex; gap: 10px; }

  #chart-canvas-wrap { position: relative; height: 220px; }

  /* History */
  .vf-history-panel { padding: 26px; }

  .vf-history-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 18px;
  }

  .vf-filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
  }

  .vf-filters .vf-input, .vf-filters .vf-select {
    padding: 9px 12px;
    font-size: 13px;
    width: auto;
  }

  #search-input { min-width: 160px; flex: 1; }

  .vf-tx-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 4px;
    border-top: 1px solid var(--border);
    gap: 12px;
  }

  .vf-tx-item:first-child { border-top: none; }

  .vf-tx-left { display: flex; align-items: center; gap: 12px; min-width: 0; }

  .vf-tx-cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .vf-tx-info { min-width: 0; }
  .vf-tx-info p { margin: 0; font-size: 14.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vf-tx-meta { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
  .vf-tx-meta .vf-cat-tag {
    color: var(--accent);
    background: var(--accent-glow);
    padding: 1px 8px;
    border-radius: 6px;
    font-size: 11px;
    margin-right: 6px;
  }

  .vf-tx-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

  .vf-tx-amt { font-family: var(--font-mono); font-weight: 700; font-size: 15px; white-space: nowrap; }
  .vf-tx-amt.pos { color: var(--emerald); }
  .vf-tx-amt.neg { color: var(--rose); }

  .vf-icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-faint);
    padding: 4px;
    display: flex;
    border-radius: 6px;
    transition: color 0.2s ease, background-color 0.2s ease;
  }
  .vf-icon-btn:hover { color: var(--accent); background: var(--accent-glow); }
  .vf-icon-btn.vf-danger:hover { color: var(--rose); background: var(--rose-glow); }

  .vf-history-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* Edit modal */
  .vf-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2, 5, 15, 0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .vf-modal-overlay.is-open { display: flex; }

  .vf-modal {
    width: 100%;
    max-width: 400px;
    padding: 30px;
  }

  .vf-modal h3 { margin-bottom: 20px; }
  .vf-modal-actions { display: flex; gap: 10px; margin-top: 6px; }

  @media (max-width: 760px) {
    .vf-grid-2 { grid-template-columns: 1fr; }
    .vf-balance-value { font-size: 38px; }
  }
</style>
</head>
<body>

<div id="vf-nav-root"></div>

<main class="vf-page">
  <div class="vf-app-wrap">
    <div class="vf-app-head">
      <div>
        <h1 id="greeting">Your ledger</h1>
        <p>Every entry, tracked and charted in one place.</p>
      </div>
    </div>

    <!-- Balance -->
    <section class="vf-balance-panel vf-panel">
      <div class="vf-balance-label">Net balance</div>
      <div class="vf-balance-value" id="balance-value">$0.00</div>
      <div class="vf-balance-stats">
        <div class="vf-stat-in"><span>Total in</span><strong id="stat-in">$0.00</strong></div>
        <div class="vf-stat-out"><span>Total out</span><strong id="stat-out">$0.00</strong></div>
        <div><span>Entries</span><strong id="stat-count" style="color:var(--text)">0</strong></div>
      </div>
    </section>

    <div class="vf-grid-2">
      <!-- Add entry form -->
      <section class="vf-panel vf-panel-pad">
        <h3>➕ New entry</h3>
        <form id="entry-form">
          <div class="vf-field">
            <label for="tx-desc">Reason</label>
            <input type="text" id="tx-desc" class="vf-input" placeholder="Salary, rent, coffee..." required>
          </div>

          <div class="vf-row-2">
            <div class="vf-field">
              <label for="tx-amt">Amount</label>
              <input type="number" id="tx-amt" class="vf-input" placeholder="0.00" step="0.01" min="0.01" required>
            </div>
            <div class="vf-field">
              <label for="tx-cat">Category</label>
              <select id="tx-cat" class="vf-select">
                <option value="Income">Income</option>
                <option value="Food">Food</option>
                <option value="Rent">Rent</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Health">Health</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="vf-field">
            <label for="tx-time">Date &amp; time</label>
            <input type="datetime-local" id="tx-time" class="vf-input" required>
          </div>

          <div class="vf-error-text" id="entry-error"></div>

          <div class="vf-entry-actions">
            <button type="button" onclick="submitEntry('in')" class="vf-btn vf-btn-primary vf-btn-block" style="background: linear-gradient(135deg, var(--emerald), #00a87d); box-shadow:0 4px 20px var(--emerald-glow); color:#04140f;">Earned</button>
            <button type="button" onclick="submitEntry('out')" class="vf-btn vf-btn-block" style="background: linear-gradient(135deg, var(--rose), #c81f4d); box-shadow:0 4px 20px var(--rose-glow); color:#1a0208;">Spent</button>
          </div>
        </form>
      </section>

      <!-- Chart -->
      <section class="vf-panel vf-panel-pad">
        <h3>📈 Expenses over time</h3>
        <div id="chart-canvas-wrap">
          <canvas id="expense-chart"></canvas>
        </div>
      </section>
    </div>

    <!-- History -->
    <section class="vf-panel vf-history-panel">
      <div class="vf-history-head">
        <div class="vf-filters">
          <input type="text" id="search-input" class="vf-input" placeholder="Search transactions...">
          <select id="filter-cat" class="vf-select" style="width:auto;">
            <option value="">All categories</option>
            <option value="Income">Income</option>
            <option value="Food">Food</option>
            <option value="Rent">Rent</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
          <select id="filter-type" class="vf-select" style="width:auto;">
            <option value="">In & out</option>
            <option value="in">Earned only</option>
            <option value="out">Spent only</option>
          </select>
        </div>
      </div>

      <div id="tx-list"></div>

      <div class="vf-history-footer">
        <button class="vf-btn vf-btn-ghost" onclick="exportData('csv')">Export CSV</button>
        <button class="vf-btn vf-btn-ghost" onclick="exportData('json')">Export JSON</button>
      </div>
    </section>
  </div>
</main>

<!-- Edit modal -->
<div class="vf-modal-overlay" id="edit-modal-overlay">
  <div class="vf-modal vf-panel">
    <h3>Edit entry</h3>
    <form id="edit-form">
      <input type="hidden" id="edit-id">
      <div class="vf-field">
        <label for="edit-desc">Reason</label>
        <input type="text" id="edit-desc" class="vf-input" required>
      </div>
      <div class="vf-row-2">
        <div class="vf-field">
          <label for="edit-amt">Amount</label>
          <input type="number" id="edit-amt" class="vf-input" step="0.01" required>
        </div>
        <div class="vf-field">
          <label for="edit-cat">Category</label>
          <select id="edit-cat" class="vf-select">
            <option value="Income">Income</option>
            <option value="Food">Food</option>
            <option value="Rent">Rent</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="vf-field">
        <label for="edit-time">Date &amp; time</label>
        <input type="datetime-local" id="edit-time" class="vf-input" required>
      </div>
      <div class="vf-modal-actions">
        <button type="button" class="vf-btn vf-btn-ghost vf-btn-block" onclick="closeEditModal()">Cancel</button>
        <button type="submit" class="vf-btn vf-btn-primary vf-btn-block">Save changes</button>
      </div>
    </form>
  </div>
</div>

<script src="./JS/core.js"></script>
<script>
  const session = VaultAuth.requireAuth();
  let allTx = [];
  let chart = null;

  const CAT_COLORS = {
    Income: '#00e6a0', Food: '#00d9ff', Rent: '#0066ff',
    Transport: '#a06bff', Entertainment: '#ff9d3d', Health: '#ff3d68', Other: '#8592b0'
  };

  if (session) {
    document.getElementById('greeting').textContent = `${session.username}'s ledger`;
    document.getElementById('tx-time').value = toLocalInputValue(new Date());
    loadTx();
  }

  function toLocalInputValue(date) {
    const off = date.getTimezoneOffset();
    const d = new Date(date.getTime() - off * 60000);
    return d.toISOString().slice(0, 16);
  }

  function loadTx() {
    allTx = VaultData.getAll(session.username);
    renderAll();
  }

  function submitEntry(type) {
    const desc = document.getElementById('tx-desc').value.trim();
    const amt = parseFloat(document.getElementById('tx-amt').value);
    const cat = document.getElementById('tx-cat').value;
    const time = document.getElementById('tx-time').value;
    const errorEl = document.getElementById('entry-error');
    errorEl.textContent = '';

    if (!desc || !amt || amt <= 0 || !time) {
      errorEl.textContent = 'Fill in a reason, a positive amount, and a date/time.';
      return;
    }

    VaultData.add(session.username, {
      desc,
      amt: type === 'out' ? -Math.abs(amt) : Math.abs(amt),
      cat,
      ts: new Date(time).toISOString(),
    });

    document.getElementById('tx-desc').value = '';
    document.getElementById('tx-amt').value = '';
    document.getElementById('tx-time').value = toLocalInputValue(new Date());

    VaultToast.show(type === 'in' ? 'Added to your earnings.' : 'Logged as spent.', 'success');
    loadTx();
  }

  function getFiltered() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const cat = document.getElementById('filter-cat').value;
    const type = document.getElementById('filter-type').value;

    return allTx.filter(t => {
      if (q && !t.desc.toLowerCase().includes(q)) return false;
      if (cat && t.cat !== cat) return false;
      if (type === 'in' && t.amt < 0) return false;
      if (type === 'out' && t.amt >= 0) return false;
      return true;
    }).sort((a, b) => new Date(b.ts) - new Date(a.ts));
  }

  function renderAll() {
    renderBalance();
    renderList();
    renderChart();
  }

  function renderBalance() {
    let total = 0, totalIn = 0, totalOut = 0;
    allTx.forEach(t => {
      total += t.amt;
      if (t.amt > 0) totalIn += t.amt; else totalOut += Math.abs(t.amt);
    });
    const balEl = document.getElementById('balance-value');
    balEl.textContent = `$${total.toFixed(2)}`;
    balEl.classList.toggle('is-negative', total < 0);
    document.getElementById('stat-in').textContent = `$${totalIn.toFixed(2)}`;
    document.getElementById('stat-out').textContent = `$${totalOut.toFixed(2)}`;
    document.getElementById('stat-count').textContent = allTx.length;
  }

  function renderList() {
    const list = document.getElementById('tx-list');
    const filtered = getFiltered();

    if (allTx.length === 0) {
      list.innerHTML = `
        <div class="vf-empty">
          <div class="vf-empty-icon">🗃️</div>
          <h4>No entries yet</h4>
          <p>Add your first transaction above to start your ledger.</p>
        </div>`;
      return;
    }

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="vf-empty">
          <div class="vf-empty-icon">🔍</div>
          <h4>No matches</h4>
          <p>Try a different search term or clear your filters.</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(t => {
      const isPos = t.amt > 0;
      const dateStr = new Date(t.ts).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
      return `
        <div class="vf-tx-item">
          <div class="vf-tx-left">
            <span class="vf-tx-cat-dot" style="background:${CAT_COLORS[t.cat] || '#8592b0'}"></span>
            <div class="vf-tx-info">
              <p>${escapeHtml(t.desc)}</p>
              <div class="vf-tx-meta"><span class="vf-cat-tag">${t.cat}</span>${dateStr}</div>
            </div>
          </div>
          <div class="vf-tx-right">
            <span class="vf-tx-amt ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : '−'}$${Math.abs(t.amt).toFixed(2)}</span>
            <button class="vf-icon-btn" onclick="openEditModal('${t.id}')" aria-label="Edit entry" title="Edit">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="vf-icon-btn vf-danger" onclick="deleteTx('${t.id}')" aria-label="Delete entry" title="Delete">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>`;
    }).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function deleteTx(id) {
    if (!confirm('Delete this entry? This cannot be undone.')) return;
    allTx = VaultData.remove(session.username, id);
    VaultToast.show('Entry deleted.', 'info');
    renderAll();
  }

  function openEditModal(id) {
    const tx = allTx.find(t => t.id === id);
    if (!tx) return;
    document.getElementById('edit-id').value = tx.id;
    document.getElementById('edit-desc').value = tx.desc;
    document.getElementById('edit-amt').value = Math.abs(tx.amt);
    document.getElementById('edit-cat').value = tx.cat;
    document.getElementById('edit-time').value = toLocalInputValue(new Date(tx.ts));
    document.getElementById('edit-modal-overlay').classList.add('is-open');
    document.getElementById('edit-modal-overlay').dataset.wasNegative = tx.amt < 0;
  }

  function closeEditModal() {
    document.getElementById('edit-modal-overlay').classList.remove('is-open');
  }

  document.getElementById('edit-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const wasNegative = document.getElementById('edit-modal-overlay').dataset.wasNegative === 'true';
    const amt = parseFloat(document.getElementById('edit-amt').value);

    allTx = VaultData.update(session.username, id, {
      desc: document.getElementById('edit-desc').value.trim(),
      amt: wasNegative ? -Math.abs(amt) : Math.abs(amt),
      cat: document.getElementById('edit-cat').value,
      ts: new Date(document.getElementById('edit-time').value).toISOString(),
    });

    closeEditModal();
    VaultToast.show('Entry updated.', 'success');
    renderAll();
  });

  ['search-input', 'filter-cat', 'filter-type'].forEach(id => {
    document.getElementById(id).addEventListener('input', renderList);
  });

  function exportData(format) {
    if (allTx.length === 0) {
      VaultToast.show('Nothing to export yet.', 'error');
      return;
    }
    let content, mime, filename;
    if (format === 'json') {
      content = JSON.stringify(allTx, null, 2);
      mime = 'application/json';
      filename = 'vaultfinance-export.json';
    } else {
      const header = 'Description,Amount,Category,DateTime\n';
      const rows = allTx.map(t => `"${t.desc.replace(/"/g, '""')}",${t.amt},${t.cat},${t.ts}`).join('\n');
      content = header + rows;
      mime = 'text/csv';
      filename = 'vaultfinance-export.csv';
    }
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    VaultToast.show(`Exported as ${format.toUpperCase()}.`, 'success');
  }

  /* ---- Lightweight canvas line chart (no external dependency) ---- */
  function renderChart() {
    const canvas = document.getElementById('expense-chart');
    const wrap = document.getElementById('chart-canvas-wrap');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = wrap.clientWidth, h = wrap.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    const expenses = allTx.filter(t => t.amt < 0).sort((a, b) => new Date(a.ts) - new Date(b.ts));

    const styles = getComputedStyle(document.documentElement);
    const rose = styles.getPropertyValue('--rose').trim() || '#ff3d68';
    const textFaint = styles.getPropertyValue('--text-faint').trim() || '#4d5a78';
    const border = styles.getPropertyValue('--border').trim();

    if (expenses.length < 2) {
      ctx.fillStyle = textFaint;
      ctx.font = '13px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Add at least 2 expenses to see a trend', w / 2, h / 2);
      return;
    }

    // cumulative spend over time
    let running = 0;
    const points = expenses.map(t => {
      running += Math.abs(t.amt);
      return { x: new Date(t.ts).getTime(), y: running };
    });

    const padding = { top: 16, right: 16, bottom: 28, left: 50 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;

    const minX = points[0].x, maxX = points[points.length - 1].x;
    const maxY = Math.max(...points.map(p => p.y));

    const xScale = (x) => padding.left + ((x - minX) / (maxX - minX || 1)) * chartW;
    const yScale = (y) => padding.top + chartH - (y / (maxY || 1)) * chartH;

    // gridlines
    ctx.strokeStyle = border;
    ctx.lineWidth = 1;
    for (let i = 0; i <= 3; i++) {
      const y = padding.top + (chartH / 3) * i;
      ctx.beginPath();
      ctx.moveTo(padding.left, y);
      ctx.lineTo(w - padding.right, y);
      ctx.stroke();
    }

    // y-axis labels
    ctx.fillStyle = textFaint;
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 3; i++) {
      const val = maxY - (maxY / 3) * i;
      const y = padding.top + (chartH / 3) * i;
      ctx.fillText('$' + val.toFixed(0), padding.left - 10, y + 4);
    }

    // line
    ctx.beginPath();
    points.forEach((p, i) => {
      const x = xScale(p.x), y = yScale(p.y);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = rose;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // gradient fill under line
    const grad = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
    grad.addColorStop(0, rose + '55');
    grad.addColorStop(1, rose + '00');
    ctx.lineTo(xScale(points[points.length - 1].x), padding.top + chartH);
    ctx.lineTo(xScale(points[0].x), padding.top + chartH);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // points
    points.forEach(p => {
      ctx.beginPath();
      ctx.arc(xScale(p.x), yScale(p.y), 3, 0, Math.PI * 2);
      ctx.fillStyle = rose;
      ctx.fill();
    });

    // x-axis labels (first / last date)
    ctx.fillStyle = textFaint;
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(new Date(minX).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }), padding.left, h - 8);
    ctx.textAlign = 'right';
    ctx.fillText(new Date(maxX).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }), w - padding.right, h - 8);
  }

  window.addEventListener('resize', () => renderChart());

  // Re-render chart when theme toggles (colors depend on CSS vars)
  const themeObserver = new MutationObserver(() => renderChart());
  themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
</script>
</body>
</html>
